# render.yaml
# Render Blueprint Configuration for EduCore API

services:
  # The Django Web API Service
  - type: web
    name: educore-api
    env: docker
    region: ohio
    plan: starter
    dockerfilePath: docker/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: educore-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: educore-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: educore-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: educore.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: CORS_ALLOWED_ORIGINS
        # Allow frontend domains here (update later when UI is built)
        value: "https://your-frontend-domain.onrender.com"
      - key: DJANGO_ALLOWED_HOSTS
        # Allow the auto-generated render domain
        value: "educore-api.onrender.com"

  # The Background Async Celery Worker
  - type: worker
    name: educore-celery-worker
    env: docker
    region: ohio
    plan: starter
    dockerfilePath: docker/Dockerfile
    dockerCommand: "celery -A educore worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: educore-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: educore-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: educore-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: educore.settings.prod

  - type: redis
    name: educore-redis
    region: ohio
    plan: starter
    ipAllowList: [] # Blocks all external access; allows internal Render access

databases:
  - name: educore-postgres
    region: ohio
    plan: starter
